<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authentication Error Details</title>
</head>
<body>
    <h2>Authentication Error Details</h2>
    <p><strong>exception:</strong> {{ exception }}</p>
    <p><strong>error:</strong> {{ error }}</p>
    <p><strong>auth_error:</strong> {{ auth_error }}</p>
    <p><strong>auth_error.code:</strong> {{ auth_error.code }}</p>
    <p><strong>auth_error.description:</strong> {{ auth_error.description }}</p>
    <p><strong>auth_error.exception:</strong> {{ auth_error.exception }}</p>
</body>
</html>
