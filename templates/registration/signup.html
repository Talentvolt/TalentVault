<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | TalentVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .signup-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 450px; }
        .btn-primary { background-color: #2563eb; border-color: #2563eb; padding: 0.625rem; font-weight: 500; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h3 class="fw-bold text-center mb-4">Create Account</h3>
        <form method="post">
            {% csrf_token %}
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label text-secondary fw-medium small">First Name</label>
                    <input type="text" name="first_name" class="form-control" required>
                </div>
                <div class="col-6">
                    <label class="form-label text-secondary fw-medium small">Last Name</label>
                    <input type="text" name="last_name" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary fw-medium small">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary fw-medium small">I am a...</label>
                <select name="role" class="form-select" required>
                    <option value="CANDIDATE">Candidate looking for jobs</option>
                    <option value="RECRUITER">Recruiter hiring talent</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary fw-medium small">Password</label>
                <input type="password" name="password" class="form-control" placeholder="At least 8 characters" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Create Account</button>
            <p class="text-center text-secondary small mb-0">Already have an account? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-medium">Sign In</a></p>
        </form>
    </div>
</body>
</html>
