<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TalentVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 400px; }
        .btn-primary { background-color: #2563eb; border-color: #2563eb; padding: 0.625rem; font-weight: 500; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="fw-bold text-center mb-4">Welcome Back</h3>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-secondary fw-medium small">Email Address</label>
                <input type="email" name="username" class="form-control" placeholder="name@company.com" required autofocus>
            </div>
            <div class="mb-4">
                <div class="d-flex justify-content-between">
                    <label class="form-label text-secondary fw-medium small">Password</label>
                    <a href="#" class="text-primary small text-decoration-none">Forgot password?</a>
                </div>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
            <p class="text-center text-secondary small mb-0">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-primary text-decoration-none fw-medium">Create one</a></p>
        </form>
    </div>
</body>
</html>
