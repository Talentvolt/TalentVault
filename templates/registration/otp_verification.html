{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP Code — TalentVault AI</title>
    <link rel="shortcut icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    <link rel="icon" href="{% static 'img/logo_square.png' %}" type="image/png">
    
    <!-- Tailwind CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6D4AFF',
                        accent: '#8B5CF6',
                        brandBlue: '#2563EB',
                        brandGreen: '#22C55E',
                        bgSlate: '#F8FAFC',
                        borderGray: '#E5E7EB',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes float-shape-1 {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        @keyframes float-shape-2 {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(-40px, 40px) scale(1.15); }
        }
        .animate-blob-1 { animation: float-shape-1 12s infinite alternate ease-in-out; }
        .animate-blob-2 { animation: float-shape-2 15s infinite alternate ease-in-out; }

        .glass-auth-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(229, 231, 235, 0.6);
            box-shadow: 0 25px 50px -12px rgba(109, 74, 255, 0.08);
        }

        .otp-input:focus {
            border-color: #6D4AFF;
            box-shadow: 0 0 0 4px rgba(109, 74, 255, 0.12);
        }
    </style>
</head>
<body class="h-full bg-[#FAF9FF] font-sans text-slate-900 flex items-center justify-center p-6 overflow-hidden relative">

    <!-- FLOATING BACKGROUND SHAPES -->
    <div class="absolute w-[450px] h-[450px] rounded-full bg-primary/10 blur-[100px] -top-20 -left-20 animate-blob-1 pointer-events-none"></div>
    <div class="absolute w-[500px] h-[500px] rounded-full bg-accent/8 blur-[120px] -bottom-40 -right-20 animate-blob-2 pointer-events-none"></div>

    <div class="w-full max-w-[480px] z-10">
        
        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 mb-8">
            <div class="w-10 h-10 rounded-2xl bg-primary flex items-center justify-center shadow-lg shadow-primary/30">
                <span class="text-white font-black text-2xl">T</span>
            </div>
            <span class="font-extrabold text-2xl tracking-tight text-slate-900">TalentVault<span class="text-primary font-bold">.ai</span></span>
        </div>

        <!-- Premium Glass Card -->
        <div class="glass-auth-card rounded-3xl p-8 sm:p-10 text-center">
            
            <!-- Icon -->
            <div class="w-16 h-16 bg-primary/10 text-primary rounded-3xl flex items-center justify-center mx-auto text-2xl mb-6">
                <i class="bi bi-shield-lock-fill"></i>
            </div>

            <h2 class="text-3xl font-extrabold tracking-tight text-slate-950 mb-2">Two-Factor Authentication</h2>
            <p class="text-slate-500 text-sm mb-8 max-w-xs mx-auto">
                We've sent a 6-digit OTP code to your registered email. Enter it below to complete verification.
            </p>

            <!-- OTP Input Form -->
            <form method="post" action="{% url 'candidate_verify_otp' %}" id="otp-form" onsubmit="prepareOtpSubmit(event)" class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="otp" id="otp_code_hidden">
                {% if error %}
                <div class="p-4 bg-red-50 border border-red-200 rounded-2xl text-red-700 text-sm font-semibold">
                    {{ error }}
                </div>
                {% endif %}
                
                <!-- 6 Digits Container -->
                <div class="flex justify-between gap-2 max-w-sm mx-auto" id="otp-inputs-container">
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-white border border-slate-200 rounded-xl transition-all duration-200 focus:outline-none" required>
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-white border border-slate-200 rounded-xl transition-all duration-200 focus:outline-none" required>
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-white border border-slate-200 rounded-xl transition-all duration-200 focus:outline-none" required>
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-white border border-slate-200 rounded-xl transition-all duration-200 focus:outline-none" required>
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-white border border-slate-200 rounded-xl transition-all duration-200 focus:outline-none" required>
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-white border border-slate-200 rounded-xl transition-all duration-200 focus:outline-none" required>
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                    <button type="submit" class="w-full h-12 rounded-xl bg-primary hover:bg-accent text-white font-bold text-sm tracking-wide shadow-lg shadow-primary/20 hover:shadow-xl transition-all duration-300 flex items-center justify-center gap-2">
                        Verify Code <i class="bi bi-patch-check"></i>
                    </button>
                </div>

            </form>

            <!-- Resend/Help Info -->
            <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col items-center gap-2">
                <button id="resend-btn" onclick="triggerResend()" class="text-xs text-primary font-bold hover:underline">
                    Didn't receive code? Resend OTP
                </button>
                <a href="{% url 'candidate_login' %}" class="text-xs text-slate-400 font-semibold hover:underline">
                    Back to Sign In
                </a>
            </div>

        </div>
    </div>

    <!-- OTP Logic script -->
    <script>
        const inputs = document.querySelectorAll('.otp-input');
        
        // Auto-focus move logic
        inputs.forEach((input, index) => {
            // Keydown detection for backspace
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace') {
                    if (input.value === '') {
                        if (index > 0) {
                            inputs[index - 1].focus();
                            inputs[index - 1].value = '';
                        }
                    } else {
                        input.value = '';
                    }
                }
            });

            // Input detection for auto-forward
            input.addEventListener('input', (e) => {
                const val = e.target.value;
                if (val.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            // Paste logic
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').trim();
                if (pasteData.length === 6 && /^\d+$/.test(pasteData)) {
                    inputs.forEach((inp, idx) => {
                        inp.value = pasteData[idx];
                    });
                    inputs[5].focus();
                }
            });
        });

        // OTP verification form submit prep
        function prepareOtpSubmit(e) {
            // Build the OTP code
            let otp = '';
            inputs.forEach(inp => otp += inp.value);
            document.getElementById('otp_code_hidden').value = otp;
        }

        let cooldown = 0;
        let timer = null;

        function triggerResend() {
            if (cooldown > 0) return;
            cooldown = 45;
            const resendBtn = document.getElementById('resend-btn');
            resendBtn.disabled = true;
            resendBtn.classList.add('opacity-50', 'no-underline', 'cursor-not-allowed');

            alert("A new 6-digit OTP code has been dispatched to your email.");

            timer = setInterval(() => {
                cooldown--;
                if (cooldown <= 0) {
                    clearInterval(timer);
                    resendBtn.innerText = "Didn't receive code? Resend OTP";
                    resendBtn.disabled = false;
                    resendBtn.classList.remove('opacity-50', 'no-underline', 'cursor-not-allowed');
                } else {
                    resendBtn.innerText = `Resend available in ${cooldown}s`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
