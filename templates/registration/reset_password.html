{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — TalentVault AI</title>
    <link rel="shortcut icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    <link rel="icon" href="{% static 'img/logo_square.png' %}" type="image/png">
    
    <!-- Tailwind CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6D4AFF',
                        accent: '#8B5CF6',
                        brandBlue: '#2563EB',
                        brandGreen: '#22C55E',
                        bgSlate: '#F8FAFC',
                        borderGray: '#E5E7EB',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes float-shape-1 {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        @keyframes float-shape-2 {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(-40px, 40px) scale(1.15); }
        }
        .animate-blob-1 { animation: float-shape-1 12s infinite alternate ease-in-out; }
        .animate-blob-2 { animation: float-shape-2 15s infinite alternate ease-in-out; }

        .glass-auth-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(229, 231, 235, 0.6);
            box-shadow: 0 25px 50px -12px rgba(109, 74, 255, 0.08);
        }

        .premium-input:focus {
            border-color: #6D4AFF;
            box-shadow: 0 0 0 4px rgba(109, 74, 255, 0.12);
        }
    </style>
</head>
<body class="h-full bg-[#FAF9FF] font-sans text-slate-900 flex items-center justify-center p-6 overflow-hidden relative">

    <!-- FLOATING BACKGROUND SHAPES -->
    <div class="absolute w-[450px] h-[450px] rounded-full bg-primary/10 blur-[100px] -top-20 -left-20 animate-blob-1 pointer-events-none"></div>
    <div class="absolute w-[500px] h-[500px] rounded-full bg-accent/8 blur-[120px] -bottom-40 -right-20 animate-blob-2 pointer-events-none"></div>

    <div class="w-full max-w-[480px] z-10">
        
        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 mb-8">
            <div class="w-10 h-10 rounded-2xl bg-primary flex items-center justify-center shadow-lg shadow-primary/30">
                <span class="text-white font-black text-2xl">T</span>
            </div>
            <span class="font-extrabold text-2xl tracking-tight text-slate-900">TalentVault<span class="text-primary font-bold">.ai</span></span>
        </div>

        <!-- Premium Glass Card -->
        <div class="glass-auth-card rounded-3xl p-8 sm:p-10">
            
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold tracking-tight text-slate-950">Setup New Password</h2>
                <p class="text-slate-500 mt-2 text-sm">Please create a strong password to secure your account.</p>
            </div>

            <!-- Password Reset Form -->
            <form method="post" action="" class="space-y-5">
                {% csrf_token %}
                <input type="hidden" name="uidb64" value="{{ uidb64|default:'' }}">
                <input type="hidden" name="token" value="{{ token|default:'' }}">
                
                {% if error_message %}
                <div class="p-4 bg-red-50 border border-red-200 rounded-2xl text-red-700 text-sm font-semibold">
                    {{ error_message }}
                </div>
                {% endif %}
                
                <!-- Password -->
                <div>
                    <label for="password" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">New Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="bi bi-key"></i>
                        </span>
                        <input type="password" name="password" id="password" required class="w-full h-12 pl-11 pr-11 rounded-xl border border-slate-200 bg-white text-slate-900 text-sm font-medium transition-all duration-200 focus:outline-none premium-input" placeholder="••••••••">
                        <button type="button" onclick="togglePassVisibility('password', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirm-password" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Confirm Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="bi bi-key-fill"></i>
                        </span>
                        <input type="password" name="confirm_password" id="confirm-password" required class="w-full h-12 pl-11 pr-11 rounded-xl border border-slate-200 bg-white text-slate-900 text-sm font-medium transition-all duration-200 focus:outline-none premium-input" placeholder="••••••••">
                        <button type="button" onclick="togglePassVisibility('confirm-password', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Strength Checklist -->
                <div class="bg-slate-50 p-4 rounded-2xl space-y-2 text-xs text-slate-500 border border-slate-100">
                    <p class="font-bold text-slate-700">Password requirements:</p>
                    <div class="flex items-center gap-2" id="req-length">
                        <i class="bi bi-circle text-[10px]"></i> At least 8 characters
                    </div>
                    <div class="flex items-center gap-2" id="req-number">
                        <i class="bi bi-circle text-[10px]"></i> Contains a number or symbol
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-2">
                    <button type="submit" class="w-full h-12 rounded-xl bg-primary hover:bg-accent text-white font-bold text-sm tracking-wide shadow-lg shadow-primary/20 hover:shadow-xl transition-all duration-300 flex items-center justify-center gap-2">
                        Reset Password <i class="bi bi-lock-fill"></i>
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!-- Password visibility toggles & validation -->
    <script>
        function togglePassVisibility(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        // Real-time strength evaluation
        const passwordInput = document.getElementById('password');
        const reqLength = document.getElementById('req-length');
        const reqNumber = document.getElementById('req-number');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            
            // Length
            if (val.length >= 8) {
                reqLength.classList.remove('text-slate-500');
                reqLength.classList.add('text-brandGreen');
                reqLength.querySelector('i').className = "bi bi-check-circle-fill text-brandGreen";
            } else {
                reqLength.classList.add('text-slate-500');
                reqLength.classList.remove('text-brandGreen');
                reqLength.querySelector('i').className = "bi bi-circle text-[10px]";
            }

            // Number or Symbol
            if (/[0-9\W]/.test(val)) {
                reqNumber.classList.remove('text-slate-500');
                reqNumber.classList.add('text-brandGreen');
                reqNumber.querySelector('i').className = "bi bi-check-circle-fill text-brandGreen";
            } else {
                reqNumber.classList.add('text-slate-500');
                reqNumber.classList.remove('text-brandGreen');
                reqNumber.querySelector('i').className = "bi bi-circle text-[10px]";
            }
        });

        // Form submits normally to Django backend
    </script>
</body>
</html>
