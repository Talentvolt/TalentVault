services:
  - type: web
    name: talentvault
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py setup_google_app
    startCommand: gunicorn config.wsgi:application -c gunicorn.conf.py
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.base
      - key: PYTHON_VERSION
        value: 3.11.9
